<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info School · Digital Signage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: #0b1a2a;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }

        /* Colori di sfondo per le feste (solo body) */
        body.festa-natale { background: #1a3f2a; }
        body.festa-halloween { background: #2a1a1a; }
        body.festa-pasqua { background: #3a2a4a; }
        body.festa-san-valentino { background: #4a2a3a; }
        body.festa-memoria { background: #2a2a2a; }
        body.festa-donna { background: #3a2a4a; }
        body.festa-papa { background: #2a3a4a; }
        body.festa-nonni { background: #3a4a2a; }
        body.festa-mamma { background: #4a2a2a; }
        body.festa-gaudenzio { background: #2a4a4a; }
        body.festa-repubblica { background: #2a4a2a; }

        .dashboard {
            width: 98%;
            height: 96vh;
            background: white;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            padding: 0 2rem;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        /* Colori del dashboard per le feste */
        .dashboard.festa-natale { 
            background: linear-gradient(135deg, #1a4a2a, #2a6a3a); 
            color: #ffd700; 
        }
        .dashboard.festa-halloween { 
            background: linear-gradient(135deg, #4a2a1a, #6a3a2a); 
            color: #ff8c00; 
        }
        .dashboard.festa-pasqua { 
            background: linear-gradient(135deg, #4a2a6a, #6a3a8a); 
            color: #ffd700; 
        }
        .dashboard.festa-san-valentino { 
            background: linear-gradient(135deg, #6a2a4a, #8a3a6a); 
            color: #ffb6c1; 
        }
        .dashboard.festa-memoria { 
            background: linear-gradient(135deg, #2a2a2a, #4a4a4a); 
            color: #ffffff; 
        }
        .dashboard.festa-donna { 
            background: linear-gradient(135deg, #4a2a6a, #6a3a8a); 
            color: #ffc0cb; 
        }
        .dashboard.festa-papa { 
            background: linear-gradient(135deg, #2a4a6a, #3a6a8a); 
            color: #ffdab9; 
        }
        .dashboard.festa-nonni { 
            background: linear-gradient(135deg, #4a6a2a, #6a8a3a); 
            color: #f0e68c; 
        }
        .dashboard.festa-mamma { 
            background: linear-gradient(135deg, #6a2a2a, #8a3a3a); 
            color: #ffb6c1; 
        }
        .dashboard.festa-gaudenzio { 
            background: linear-gradient(135deg, #2a6a6a, #3a8a8a); 
            color: #ffd700; 
        }
        .dashboard.festa-repubblica { 
            background: linear-gradient(135deg, #2a6a2a, #3a8a3a); 
            color: #ffffff; 
        }

        /* TOP BAR CON LOGO */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 2px solid #e0eaf5;
        }

        .dashboard.festa-natale .top-bar,
        .dashboard.festa-halloween .top-bar,
        .dashboard.festa-pasqua .top-bar,
        .dashboard.festa-san-valentino .top-bar,
        .dashboard.festa-memoria .top-bar,
        .dashboard.festa-donna .top-bar,
        .dashboard.festa-papa .top-bar,
        .dashboard.festa-nonni .top-bar,
        .dashboard.festa-mamma .top-bar,
        .dashboard.festa-gaudenzio .top-bar,
        .dashboard.festa-repubblica .top-bar {
            border-bottom-color: rgba(255,255,255,0.3);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .logo {
            height: 70px;
            width: auto;
        }

        .logo img {
            height: 100%;
            width: auto;
            max-width: 250px;
            object-fit: contain;
        }

        .logo-fallback {
            font-size: 2rem;
            font-weight: 700;
            color: #0a2b44;
        }

        .dashboard.festa-natale .logo-fallback,
        .dashboard.festa-halloween .logo-fallback,
        .dashboard.festa-pasqua .logo-fallback,
        .dashboard.festa-san-valentino .logo-fallback,
        .dashboard.festa-memoria .logo-fallback,
        .dashboard.festa-donna .logo-fallback,
        .dashboard.festa-papa .logo-fallback,
        .dashboard.festa-nonni .logo-fallback,
        .dashboard.festa-mamma .logo-fallback,
        .dashboard.festa-gaudenzio .logo-fallback,
        .dashboard.festa-repubblica .logo-fallback {
            color: inherit;
        }

        /* testo affianco al logo */
        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0a2b44;
            white-space: nowrap;
        }

        .dashboard.festa-natale .logo-text,
        .dashboard.festa-halloween .logo-text,
        .dashboard.festa-pasqua .logo-text,
        .dashboard.festa-san-valentino .logo-text,
        .dashboard.festa-memoria .logo-text,
        .dashboard.festa-donna .logo-text,
        .dashboard.festa-papa .logo-text,
        .dashboard.festa-nonni .logo-text,
        .dashboard.festa-mamma .logo-text,
        .dashboard.festa-gaudenzio .logo-text,
        .dashboard.festa-repubblica .logo-text {
            color: inherit;
        }

        .qr-code {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: #f5f5f5;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            border: 1px solid #c00a1c;
        }

        .dashboard.festa-natale .qr-code,
        .dashboard.festa-halloween .qr-code,
        .dashboard.festa-pasqua .qr-code,
        .dashboard.festa-san-valentino .qr-code,
        .dashboard.festa-memoria .qr-code,
        .dashboard.festa-donna .qr-code,
        .dashboard.festa-papa .qr-code,
        .dashboard.festa-nonni .qr-code,
        .dashboard.festa-mamma .qr-code,
        .dashboard.festa-gaudenzio .qr-code,
        .dashboard.festa-repubblica .qr-code {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.3);
        }

        .qr-code img {
            width: 50px;
            height: 50px;
        }

        .qr-code span {
            font-size: 1.2rem;
            font-weight: 500;
            color: #0a2b44;
        }

        .dashboard.festa-natale .qr-code span,
        .dashboard.festa-halloween .qr-code span,
        .dashboard.festa-pasqua .qr-code span,
        .dashboard.festa-san-valentino .qr-code span,
        .dashboard.festa-memoria .qr-code span,
        .dashboard.festa-donna .qr-code span,
        .dashboard.festa-papa .qr-code span,
        .dashboard.festa-nonni .qr-code span,
        .dashboard.festa-mamma .qr-code span,
        .dashboard.festa-gaudenzio .qr-code span,
        .dashboard.festa-repubblica .qr-code span {
            color: inherit;
        }

        .saluto {
            font-size: 1.8rem;
            font-weight: 500;
            color: #c00a1c;
            background: #ffeeee;
            padding: 0.5rem 2rem;
            border-radius: 60px;
        }

        .dashboard.festa-natale .saluto,
        .dashboard.festa-halloween .saluto,
        .dashboard.festa-pasqua .saluto,
        .dashboard.festa-san-valentino .saluto,
        .dashboard.festa-memoria .saluto,
        .dashboard.festa-donna .saluto,
        .dashboard.festa-papa .saluto,
        .dashboard.festa-nonni .saluto,
        .dashboard.festa-mamma .saluto,
        .dashboard.festa-gaudenzio .saluto,
        .dashboard.festa-repubblica .saluto {
            background: rgba(255,255,255,0.2);
            color: inherit;
        }

        /* AUGURI SPECIALI (solo quando c'è una festa) */
        .auguri-speciali {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0.2rem 0 0.5rem 0;
            padding: 0.5rem;
            background: rgba(255,255,255,0.15);
            border-radius: 50px;
            color: inherit;
            display: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.01); }
            100% { transform: scale(1); }
        }

        /* AREA METEO - PIÙ GRANDE */
        .meteo-main {
            background: linear-gradient(135deg, #0a2b44 0%, #1a3f5c 100%);
            color: white;
            margin: 1.5rem 0;
            padding: 2rem;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 30px rgba(0,20,40,0.3);
            transition: all 0.5s ease;
        }

        .dashboard.festa-natale .meteo-main,
        .dashboard.festa-halloween .meteo-main,
        .dashboard.festa-pasqua .meteo-main,
        .dashboard.festa-san-valentino .meteo-main,
        .dashboard.festa-memoria .meteo-main,
        .dashboard.festa-donna .meteo-main,
        .dashboard.festa-papa .meteo-main,
        .dashboard.festa-nonni .meteo-main,
        .dashboard.festa-mamma .meteo-main,
        .dashboard.festa-gaudenzio .meteo-main,
        .dashboard.festa-repubblica .meteo-main {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(5px);
        }

        .meteo-row-1 {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .data-ora-grande {
            display: flex;
            align-items: baseline;
            gap: 2rem;
        }

        .ora-grande {
            font-size: 5rem;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            letter-spacing: 5px;
        }

        .data-grande {
            font-size: 2.2rem;
            font-weight: 400;
            opacity: 0.9;
        }

        .meteo-riassunto {
            display: flex;
            align-items: center;
            gap: 3rem;
            background: rgba(255,255,255,0.1);
            padding: 1rem 3rem;
            border-radius: 80px;
        }

        .icona-temp-grande {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .icona-meteo-grande {
            font-size: 5rem;
        }

        .temp-grande {
            font-size: 5rem;
            font-weight: 700;
        }

        .desc-grande {
            font-size: 2rem;
            text-transform: capitalize;
        }

        .meteo-row-2 {
            display: flex;
            justify-content: space-around;
            padding: 1rem 0;
        }

        .meteo-dettaglio-card {
            background: rgba(255,255,255,0.08);
            border-radius: 30px;
            padding: 1.2rem 2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex: 1;
            margin: 0 0.5rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .dettaglio-icona {
            font-size: 2.5rem;
        }

        .dettaglio-testo {
            display: flex;
            flex-direction: column;
        }

        .dettaglio-label {
            font-size: 1rem;
            text-transform: uppercase;
            opacity: 0.7;
            letter-spacing: 1px;
        }

        .dettaglio-valore {
            font-size: 2rem;
            font-weight: 600;
        }

        /* TITOLO SEZIONE */
        .section-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #0a2b44;
            margin-bottom: 0.8rem;
            padding-left: 0.5rem;
        }

        .dashboard.festa-natale .section-title,
        .dashboard.festa-halloween .section-title,
        .dashboard.festa-pasqua .section-title,
        .dashboard.festa-san-valentino .section-title,
        .dashboard.festa-memoria .section-title,
        .dashboard.festa-donna .section-title,
        .dashboard.festa-papa .section-title,
        .dashboard.festa-nonni .section-title,
        .dashboard.festa-mamma .section-title,
        .dashboard.festa-gaudenzio .section-title,
        .dashboard.festa-repubblica .section-title {
            color: inherit;
        }

        /* AREA CAROSELLO COMPATTA */
        .carosello {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
        }

        .slide-container {
            display: flex;
            gap: 2rem;
            background: #f5f9ff;
            border-radius: 30px;
            padding: 1.2rem;
            border: 2px solid #d0e0f0;
            margin-bottom: 1rem;
            max-height: 280px;
            transition: all 0.5s ease;
        }

        .dashboard.festa-natale .slide-container,
        .dashboard.festa-halloween .slide-container,
        .dashboard.festa-pasqua .slide-container,
        .dashboard.festa-san-valentino .slide-container,
        .dashboard.festa-memoria .slide-container,
        .dashboard.festa-donna .slide-container,
        .dashboard.festa-papa .slide-container,
        .dashboard.festa-nonni .slide-container,
        .dashboard.festa-mamma .slide-container,
        .dashboard.festa-gaudenzio .slide-container,
        .dashboard.festa-repubblica .slide-container {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.3);
        }

        .indirizzo-image-area {
            width: 220px;
            height: 220px;
            background: white;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #c00a1c;
            overflow: hidden;
            flex-shrink: 0;
        }

        .dashboard.festa-natale .indirizzo-image-area,
        .dashboard.festa-halloween .indirizzo-image-area,
        .dashboard.festa-pasqua .indirizzo-image-area,
        .dashboard.festa-san-valentino .indirizzo-image-area,
        .dashboard.festa-memoria .indirizzo-image-area,
        .dashboard.festa-donna .indirizzo-image-area,
        .dashboard.festa-papa .indirizzo-image-area,
        .dashboard.festa-nonni .indirizzo-image-area,
        .dashboard.festa-mamma .indirizzo-image-area,
        .dashboard.festa-gaudenzio .indirizzo-image-area,
        .dashboard.festa-repubblica .indirizzo-image-area {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.3);
        }

        .indirizzo-image-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #eef3f9;
            color: #2e4a6b;
            font-size: 4rem;
        }

        .dashboard.festa-natale .image-placeholder,
        .dashboard.festa-halloween .image-placeholder,
        .dashboard.festa-pasqua .image-placeholder,
        .dashboard.festa-san-valentino .image-placeholder,
        .dashboard.festa-memoria .image-placeholder,
        .dashboard.festa-donna .image-placeholder,
        .dashboard.festa-papa .image-placeholder,
        .dashboard.festa-nonni .image-placeholder,
        .dashboard.festa-mamma .image-placeholder,
        .dashboard.festa-gaudenzio .image-placeholder,
        .dashboard.festa-repubblica .image-placeholder {
            background: rgba(255,255,255,0.1);
            color: inherit;
        }

        .indirizzo-text-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .indirizzo-nome {
            font-size: 3rem;
            font-weight: 800;
            color: #0a2b44;
            line-height: 1.2;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .dashboard.festa-natale .indirizzo-nome,
        .dashboard.festa-halloween .indirizzo-nome,
        .dashboard.festa-pasqua .indirizzo-nome,
        .dashboard.festa-san-valentino .indirizzo-nome,
        .dashboard.festa-memoria .indirizzo-nome,
        .dashboard.festa-donna .indirizzo-nome,
        .dashboard.festa-papa .indirizzo-nome,
        .dashboard.festa-nonni .indirizzo-nome,
        .dashboard.festa-mamma .indirizzo-nome,
        .dashboard.festa-gaudenzio .indirizzo-nome,
        .dashboard.festa-repubblica .indirizzo-nome {
            color: inherit;
        }

        .indirizzo-desc {
            font-size: 1.3rem;
            color: #2a4c73;
            font-weight: 500;
            border-top: 2px solid #c00a1c;
            padding-top: 0.8rem;
        }

        .dashboard.festa-natale .indirizzo-desc,
        .dashboard.festa-halloween .indirizzo-desc,
        .dashboard.festa-pasqua .indirizzo-desc,
        .dashboard.festa-san-valentino .indirizzo-desc,
        .dashboard.festa-memoria .indirizzo-desc,
        .dashboard.festa-donna .indirizzo-desc,
        .dashboard.festa-papa .indirizzo-desc,
        .dashboard.festa-nonni .indirizzo-desc,
        .dashboard.festa-mamma .indirizzo-desc,
        .dashboard.festa-gaudenzio .indirizzo-desc,
        .dashboard.festa-repubblica .indirizzo-desc {
            color: inherit;
            border-top-color: rgba(255,255,255,0.3);
        }

        /* PROGRESS BAR */
        .progress-bar-container {
            width: 100%;
            margin-bottom: 1rem;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0eaf5;
            border-radius: 30px;
            overflow: hidden;
        }

        .dashboard.festa-natale .progress-bar,
        .dashboard.festa-halloween .progress-bar,
        .dashboard.festa-pasqua .progress-bar,
        .dashboard.festa-san-valentino .progress-bar,
        .dashboard.festa-memoria .progress-bar,
        .dashboard.festa-donna .progress-bar,
        .dashboard.festa-papa .progress-bar,
        .dashboard.festa-nonni .progress-bar,
        .dashboard.festa-mamma .progress-bar,
        .dashboard.festa-gaudenzio .progress-bar,
        .dashboard.festa-repubblica .progress-bar {
            background: rgba(255,255,255,0.2);
        }

        .progress-fill {
            height: 100%;
            background: #c00a1c;
            width: 0%;
            border-radius: 30px;
            transition: width 0.1s linear;
        }

        .dashboard.festa-natale .progress-fill,
        .dashboard.festa-halloween .progress-fill,
        .dashboard.festa-pasqua .progress-fill,
        .dashboard.festa-san-valentino .progress-fill,
        .dashboard.festa-memoria .progress-fill,
        .dashboard.festa-donna .progress-fill,
        .dashboard.festa-papa .progress-fill,
        .dashboard.festa-nonni .progress-fill,
        .dashboard.festa-mamma .progress-fill,
        .dashboard.festa-gaudenzio .progress-fill,
        .dashboard.festa-repubblica .progress-fill {
            background: rgba(255,255,255,0.8);
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.3rem;
            font-size: 1rem;
            color: #2e4a6b;
        }

        .dashboard.festa-natale .progress-info,
        .dashboard.festa-halloween .progress-info,
        .dashboard.festa-pasqua .progress-info,
        .dashboard.festa-san-valentino .progress-info,
        .dashboard.festa-memoria .progress-info,
        .dashboard.festa-donna .progress-info,
        .dashboard.festa-papa .progress-info,
        .dashboard.festa-nonni .progress-info,
        .dashboard.festa-mamma .progress-info,
        .dashboard.festa-gaudenzio .progress-info,
        .dashboard.festa-repubblica .progress-info {
            color: inherit;
        }

        .dots-minimal {
            display: flex;
            gap: 0.4rem;
        }

        .dot-minimal {
            width: 30px;
            height: 5px;
            background: #c0d0e0;
            border-radius: 10px;
            transition: 0.3s;
        }

        .dot-minimal.active {
            background: #c00a1c;
            width: 45px;
        }

        .dashboard.festa-natale .dot-minimal,
        .dashboard.festa-halloween .dot-minimal,
        .dashboard.festa-pasqua .dot-minimal,
        .dashboard.festa-san-valentino .dot-minimal,
        .dashboard.festa-memoria .dot-minimal,
        .dashboard.festa-donna .dot-minimal,
        .dashboard.festa-papa .dot-minimal,
        .dashboard.festa-nonni .dot-minimal,
        .dashboard.festa-mamma .dot-minimal,
        .dashboard.festa-gaudenzio .dot-minimal,
        .dashboard.festa-repubblica .dot-minimal {
            background: rgba(255,255,255,0.3);
        }

        .dashboard.festa-natale .dot-minimal.active,
        .dashboard.festa-halloween .dot-minimal.active,
        .dashboard.festa-pasqua .dot-minimal.active,
        .dashboard.festa-san-valentino .dot-minimal.active,
        .dashboard.festa-memoria .dot-minimal.active,
        .dashboard.festa-donna .dot-minimal.active,
        .dashboard.festa-papa .dot-minimal.active,
        .dashboard.festa-nonni .dot-minimal.active,
        .dashboard.festa-mamma .dot-minimal.active,
        .dashboard.festa-gaudenzio .dot-minimal.active,
        .dashboard.festa-repubblica .dot-minimal.active {
            background: rgba(255,255,255,0.9);
        }
    </style>
</head>
<body>
<div class="dashboard" id="dashboard">

    <!-- TOP BAR CON LOGO E QR CODE -->
    <div class="top-bar">
        <div class="logo-area">
            <div class="logo">
                <img src="images/logo.png" alt="Logo I.T.S. Rimini" onerror="this.onerror=null; this.parentElement.innerHTML='<span class=\'logo-fallback\'>🏫 I.T.S. RIMINI</span>';">
            </div>

    <div class="meteo-main">

            <div class="meteo-dettaglio-card">

            <div class="meteo-dettaglio-card">

            <div class="meteo-dettaglio-card">

<script>
    (function() {
        const API_KEY = '34743dedccb2cccfe2b3986b35bf78d4'; 
        
        const indirizzi = [
            { 
                nome: 'CHIMICA', 
                desc: 'Tecnologie farmaceutiche · Analisi · Biotecnologie · Materiali',
                img: 'images/chimica.jpg'
            },
            { 
                nome: 'INFORMATICA', 
                desc: 'Sviluppo software · Reti · Cybersecurity · IA',
                img: 'images/informatica.jpg'
            },
            { 
                nome: 'MECCANICA', 
                desc: 'Meccatronica · Progettazione CAD · Impianti · Robotica',
                img: 'images/meccanica.jpg'
            },
            { 
                nome: 'ELETTRONICA', 
                desc: 'Automazione · Sistemi embedded · Elettronica digitale',
                img: 'images/elettronica.jpg'
            },
            { 
                nome: 'CAT', 
                desc: 'Costruzioni · Ambiente · Territorio · BIM',
                img: 'images/cat.jpg'
            },
            { 
                nome: 'GRAFICA', 
                desc: 'Comunicazione visiva · Fotografia · Video · Social',
                img: 'images/grafica.jpg'
            }
        ];

        let currentSlide = 0;
        let progressInterval;
        const TEMPO_SLIDE = 10000;

        // ============================================
        // SISTEMA FESTIVITÀ
        // ============================================
        
        // Funzione per calcolare la data di Pasqua (algoritmo di Gauss)
        function calcolaPasqua(anno) {
            const a = anno % 19;
            const b = Math.floor(anno / 100);
            const c = anno % 100;
            const d = Math.floor(b / 4);
            const e = b % 4;
            const f = Math.floor((b + 8) / 25);
            const g = Math.floor((b - f + 1) / 3);
            const h = (19 * a + b - d - g + 15) % 30;
            const i = Math.floor(c / 4);
            const k = c % 4;
            const l = (32 + 2 * e + 2 * i - h - k) % 7;
            const m = Math.floor((a + 11 * h + 22 * l) / 451);
            const mese = Math.floor((h + l - 7 * m + 114) / 31);
            const giorno = ((h + l - 7 * m + 114) % 31) + 1;
            
            return new Date(anno, mese - 1, giorno);
        }

        // Funzione per controllare se una data è nel periodo di Pasqua (±3 giorni)
        function isPeriodoPasqua(data) {
            const anno = data.getFullYear();
            const pasqua = calcolaPasqua(anno);
            
            const inizioPeriodo = new Date(pasqua);
            inizioPeriodo.setDate(pasqua.getDate() - 3);
            
            const finePeriodo = new Date(pasqua);
            finePeriodo.setDate(pasqua.getDate() + 3);
            
            return data >= inizioPeriodo && data <= finePeriodo;
        }

        // Funzione principale che determina la festività corrente
        function getFestaCorrente() {
            const oggi = new Date();
            const mese = oggi.getMonth() + 1;
            const giorno = oggi.getDate();
            const anno = oggi.getFullYear();
            
            // San Gaudenzio (14 ottobre - patrono di Rimini)
            if (mese === 10 && giorno >= 10 && giorno <= 14) {
                return {
                    nome: 'gaudenzio',
                    auguri: '🎉 Buon San Gaudenzio, patrono di Rimini! 🎉',
                    classe: 'festa-gaudenzio'
                };
            }
            
            // Festa della Repubblica (2 giugno, giorni prima)
            if (mese === 5 && giorno >= 28 || (mese === 6 && giorno <= 2)) {
                return {
                    nome: 'repubblica',
                    auguri: '🇮🇹 Festa della Repubblica Italiana! 🇮🇹',
                    classe: 'festa-repubblica'
                };
            }
            
            // Halloween (31 ottobre)
            if (mese === 10 && giorno === 31) {
                return {
                    nome: 'halloween',
                    auguri: '🎃 Dolcetto o scherzetto? Buon Halloween! 🎃',
                    classe: 'festa-halloween'
                };
            }
            
            // Feste natalizie (15 dicembre - 10 gennaio)
            if ((mese === 12 && giorno >= 15) || (mese === 1 && giorno <= 10)) {
                return {
                    nome: 'natale',
                    auguri: '🎄 Buon Natale e Felice Anno Nuovo! 🎄',
                    classe: 'festa-natale'
                };
            }
            
            // San Valentino (7-21 febbraio)
            if (mese === 2 && giorno >= 7 && giorno <= 21) {
                return {
                    nome: 'san-valentino',
                    auguri: '❤️ Buon San Valentino! ❤️',
                    classe: 'festa-san-valentino'
                };
            }
            
            // Giornata della Memoria (27 gennaio)
            if (mese === 1 && giorno === 27) {
                return {
                    nome: 'memoria',
                    auguri: '🕯️ Giornata della Memoria · Per non dimenticare 🕯️',
                    classe: 'festa-memoria'
                };
            }
            
            // Festa della Donna (8 marzo)
            if (mese === 3 && giorno === 8) {
                return {
                    nome: 'donna',
                    auguri: '🌸 Festa della Donna · 8 Marzo 🌸',
                    classe: 'festa-donna'
                };
            }
            
            // Festa del Papà (19 marzo)
            if (mese === 3 && giorno === 19) {
                return {
                    nome: 'papa',
                    auguri: '👔 Buona Festa del Papà! 👔',
                    classe: 'festa-papa'
                };
            }
            
            // Festa dei Nonni (2 ottobre)
            if (mese === 10 && giorno === 2) {
                return {
                    nome: 'nonni',
                    auguri: '👴👵 Buona Festa dei Nonni! 👴👵',
                    classe: 'festa-nonni'
                };
            }
            
            // Festa della Mamma (seconda domenica di maggio)
            if (mese === 5) {
                const primaDomenica = new Date(anno, 4, 1);
                while (primaDomenica.getDay() !== 0) {
                    primaDomenica.setDate(primaDomenica.getDate() + 1);
                }
                const secondaDomenica = new Date(primaDomenica);
                secondaDomenica.setDate(primaDomenica.getDate() + 7);
                
                if (oggi.toDateString() === secondaDomenica.toDateString()) {
                    return {
                        nome: 'mamma',
                        auguri: '🌷 Buona Festa della Mamma! 🌷',
                        classe: 'festa-mamma'
                    };
                }
            }
            
            // Pasqua (periodo di ±3 giorni)
            if (isPeriodoPasqua(oggi)) {
                return {
                    nome: 'pasqua',
                    auguri: '🐣 Buona Pasqua! 🐣',
                    classe: 'festa-pasqua'
                };
            }
            
            return null;
        }

        // Applica il tema della festività
        function applicaTemaFestivo() {
            const festa = getFestaCorrente();
            const body = document.body;
            const dashboard = document.getElementById('dashboard');
            const auguriElement = document.getElementById('auguriSpeciali');
            
            // Rimuovi tutte le classi di festa
            body.className = '';
            dashboard.className = 'dashboard';
            
            const classiFesta = [
                'festa-natale', 'festa-halloween', 'festa-pasqua', 
                'festa-san-valentino', 'festa-memoria', 'festa-donna',
                'festa-papa', 'festa-nonni', 'festa-mamma',
                'festa-gaudenzio', 'festa-repubblica'
            ];
            
            classiFesta.forEach(classe => {
                body.classList.remove(classe);
                dashboard.classList.remove(classe);
            });
            
            if (festa) {
                body.classList.add(festa.classe);
                dashboard.classList.add(festa.classe);
                auguriElement.textContent = festa.auguri;
                auguriElement.style.display = 'block';
            } else {
                auguriElement.style.display = 'none';
            }
        }

        // SALUTO BASATO SULL'ORA
        function aggiornaSaluto() {
            const salutoEl = document.getElementById('saluto');
            const ora = new Date().getHours();
            
            if (ora >= 5 && ora < 13) salutoEl.textContent = 'Buongiorno 🌅';
            else if (ora >= 13 && ora < 18) salutoEl.textContent = 'Buon pomeriggio ☀️';
            else salutoEl.textContent = 'Buonasera 🌙';
        }

        // DATA E ORA
        function aggiornaOraData() {
            const now = new Date();
            const ore = String(now.getHours()).padStart(2, '0');
            const minuti = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('ora').textContent = `${ore}:${minuti}`;
            
            const giorni = ['Domenica', 'Lunedì', 'Martedì', 'Mercoledì', 'Giovedì', 'Venerdì', 'Sabato'];
            const mesi = ['Gennaio', 'Febbraio', 'Marzo', 'Aprile', 'Maggio', 'Giugno', 'Luglio', 'Agosto', 'Settembre', 'Ottobre', 'Novembre', 'Dicembre'];
            
            document.getElementById('data').textContent = 
                `${giorni[now.getDay()]} ${now.getDate()} ${mesi[now.getMonth()]} ${now.getFullYear()}`;
        }

        // FUNZIONE PER ICONA METEO
        function getIconaMeteo(condizione) {
            const desc = condizione.toLowerCase();
            if (desc.includes('sereno') || desc.includes('clear')) return '☀️';
            if (desc.includes('poco nuvoloso') || desc.includes('few clouds')) return '🌤️';
            if (desc.includes('nuvoloso') || desc.includes('clouds')) return '☁️';
            if (desc.includes('pioggia') || desc.includes('rain')) return '🌧️';
            if (desc.includes('temporale') || desc.includes('thunderstorm')) return '⛈️';
            if (desc.includes('nebbia') || desc.includes('fog')) return '🌫️';
            if (desc.includes('neve') || desc.includes('snow')) return '❄️';
            return '⛅';
        }

        // METEO REALE DA OPENWEATHERMAP
        async function caricaMeteoReale() {
            const citta = 'Rimini';
            
            const forecastUrl = `https://api.openweathermap.org/data/2.5/forecast?q=${citta}&units=metric&lang=it&appid=${API_KEY}`;
            
            try {
                const weatherResponse = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${citta}&units=metric&lang=it&appid=${API_KEY}`);
                
                if (!weatherResponse.ok) {
                    throw new Error(`Errore API: ${weatherResponse.status}`);
                }
                
                const data = await weatherResponse.json();
                
                const forecastResponse = await fetch(forecastUrl);
                let rainProbability = 0;
                
                if (forecastResponse.ok) {
                    const forecastData = await forecastResponse.json();
                    if (forecastData.list && forecastData.list[0] && forecastData.list[0].pop !== undefined) {
                        rainProbability = Math.round(forecastData.list[0].pop * 100);
                    }
                }
                
                const temp = Math.round(data.main.temp);
                const feelsLike = Math.round(data.main.feels_like);
                const humidity = data.main.humidity;
                const windSpeed = Math.round(data.wind.speed * 3.6 * 10) / 10;
                const description = data.weather[0].description;
                
                const alba = new Date(data.sys.sunrise * 1000);
                const tramonto = new Date(data.sys.sunset * 1000);
                
                const albaStr = String(alba.getHours()).padStart(2,'0') + ':' + String(alba.getMinutes()).padStart(2,'0');
                const tramontoStr = String(tramonto.getHours()).padStart(2,'0') + ':' + String(tramonto.getMinutes()).padStart(2,'0');
                
                document.getElementById('temp').innerHTML = temp + '°';
                document.getElementById('desc').innerHTML = description;
                document.getElementById('iconaMeteo').innerHTML = getIconaMeteo(description);
                document.getElementById('percepita').innerHTML = feelsLike + '°';
                document.getElementById('umidita').innerHTML = humidity + '%';
                document.getElementById('pioggia').innerHTML = rainProbability + '%';
                document.getElementById('vento').innerHTML = windSpeed.toFixed(1) + ' km/h';
                document.getElementById('alba').innerHTML = albaStr;
                document.getElementById('tramonto').innerHTML = tramontoStr;
                
            } catch (error) {
                console.error('Errore nel caricamento del meteo:', error);
                
                document.getElementById('temp').innerHTML = '--°';
                document.getElementById('desc').innerHTML = 'Errore caricamento';
                document.getElementById('iconaMeteo').innerHTML = '❓';
                document.getElementById('percepita').innerHTML = '--°';
                document.getElementById('umidita').innerHTML = '--%';
                document.getElementById('pioggia').innerHTML = '--%';
                document.getElementById('vento').innerHTML = '-- km/h';
                document.getElementById('alba').innerHTML = '--:--';
                document.getElementById('tramonto').innerHTML = '--:--';
            }
        }

        // CAROSELLO
        function aggiornaSlide(index) {
            const container = document.getElementById('slideContainer');
            const s = indirizzi[index];
            
            container.innerHTML = `
                <div class="indirizzo-image-area">
                    <img src="${s.img}" alt="${s.nome}" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'image-placeholder\'>📷</div>';">
                </div>
                <div class="indirizzo-text-area">
                    <div class="indirizzo-nome">${s.nome}</div>
                    <div class="indirizzo-desc">${s.desc}</div>
                </div>
            `;

            document.querySelectorAll('.dot-minimal').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
            
            resetProgressBar();
        }

        function resetProgressBar() {
            if (progressInterval) clearInterval(progressInterval);
            
            const progressFill = document.getElementById('progressFill');
            progressFill.style.width = '0%';
            
            const startTime = Date.now();
            progressInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const percent = (elapsed / TEMPO_SLIDE) * 100;
                
                if (percent <= 100) {
                    progressFill.style.width = percent + '%';
                } else {
                    clearInterval(progressInterval);
                }
            }, 50);
        }

        function slideSuccessiva() {
            currentSlide = (currentSlide + 1) % indirizzi.length;
            aggiornaSlide(currentSlide);
        }

        function creaPalliniMinimal() {
            const container = document.getElementById('dotsMinimal');
            container.innerHTML = '';
            indirizzi.forEach((_, idx) => {
                const dot = document.createElement('span');
                dot.className = 'dot-minimal' + (idx === 0 ? ' active' : '');
                container.appendChild(dot);
            });
        }

        // AVVIO
        window.addEventListener('DOMContentLoaded', () => {
            aggiornaSaluto();
            aggiornaOraData();
            
            // Applica tema festivo
            applicaTemaFestivo();
            
            // Carica meteo reale
            caricaMeteoReale();
            
            creaPalliniMinimal();
            aggiornaSlide(0);
            
            // Interval autoplay
            setInterval(slideSuccessiva, TEMPO_SLIDE);
            
            // Aggiornamenti periodici
            setInterval(aggiornaOraData, 1000);
            setInterval(caricaMeteoReale, 900000);
            setInterval(aggiornaSaluto, 60000);
            setInterval(applicaTemaFestivo, 3600000);
        });
    })();
</script>
