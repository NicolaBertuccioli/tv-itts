<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info School · Digital Signage</title>
    <style>
    * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: #0b1a2a;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }

        .dashboard {
            width: 98%;
            height: 96vh;
            background: white;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            padding: 0 2rem;
            transition: background-color 0.5s ease, color 0.5s ease;
            position: relative;
        }

        /* ============================================
           TEMI FESTIVITÀ
           ============================================ */
        body.festa-natale { background: #1a3f2a; }
        body.festa-halloween { background: #2a1a1a; }
        body.festa-pasqua { background: #3a2a4a; }
        body.festa-san-valentino { background: #4a2a3a; }
        body.festa-memoria { background: #2a2a2a; }
        /* Festa della donna: colori mimosa */
        body.festa-donna { background: #ffd966; }
        body.festa-papa { background: #2a3a4a; }
        body.festa-nonni { background: #3a4a2a; }
        body.festa-mamma { background: #4a2a2a; }
        body.festa-gaudenzio { background: #2a4a4a; }
        body.festa-repubblica { background: #2a4a2a; }

        .dashboard.festa-natale { background: linear-gradient(135deg, #1a4a2a, #2a6a3a); color: #ffd700; }
        .dashboard.festa-halloween { background: linear-gradient(135deg, #4a2a1a, #6a3a2a); color: #ff8c00; }
        .dashboard.festa-pasqua { background: linear-gradient(135deg, #4a2a6a, #6a3a8a); color: #ffd700; }
        .dashboard.festa-san-valentino { background: linear-gradient(135deg, #6a2a4a, #8a3a6a); color: #ffb6c1; }
        .dashboard.festa-memoria { background: linear-gradient(135deg, #2a2a2a, #4a4a4a); color: #ffffff; }
        .dashboard.festa-donna { background: linear-gradient(135deg, #ffe680, #ffd966); color: #000; }
        
        /* -------------------------------------------
           TEMA DONNA: PERSONALIZZAZIONE COLORI MIMOSA
           ------------------------------------------- */
        /* Sfondi chiari e testo scuro per leggibilità su giallo */
        .dashboard.festa-donna .slide-container {
            background: white;
            border-color: rgba(0,0,0,0.1);
        }
        .dashboard.festa-donna .previsioni-orarie {
            border-top-color: rgba(0,0,0,0.2);
        }
        .dashboard.festa-donna .previsione-card {
            background: rgba(255,255,255,0.9);
        }
        .dashboard.festa-donna, .dashboard.festa-donna * {
            color: #000 !important;
        }
        .dashboard.festa-donna .meteo-dettaglio-card {
            background: rgba(255,255,255,0.9);
        }
        .dashboard.festa-donna .meteo-riassunto {
            background: white;
            border: 1px solid rgba(0,0,0,0.1);
        }
        .dashboard.festa-donna .notizia-item {
            background: white;
            border-left-color: #2d8a4e;
        }
        .dashboard.festa-donna .qr-code {
            border-color: #2d8a4e !important;
        }

        .dashboard.festa-donna .saluto {
            background: white !important;
            border-color: rgba(0,0,0,0.1) !important;
        }

        /* Colore dei bordi verde mimosa - applicato a tutti gli elementi del carosello */
        .dashboard.festa-donna .indirizzo-image-area {
            border-color: #2d8a4e !important;
        }
        
        .dashboard.festa-donna .slide-container.tipo-scuola .indirizzo-image-area {
            border-color: #2d8a4e !important;
        }
        
        .dashboard.festa-donna .slide-container.tipo-indirizzo .indirizzo-image-area {
            border-color: #2d8a4e !important;
        }

        .dashboard.festa-donna .top-bar { border-bottom-color: #2d8a4e; }
        .dashboard.festa-donna .progress-fill { background: #2d8a4e; }
        .dashboard.festa-donna .countdown-card {
            background: rgba(255,255,255,0.9) !important;
            color: #000 !important;
        }
        /* ------------------------------------------- */

        .dashboard.festa-papa { background: linear-gradient(135deg, #2a4a6a, #3a6a8a); color: #ffdab9; }
        .dashboard.festa-nonni { background: linear-gradient(135deg, #4a6a2a, #6a8a3a); color: #f0e68c; }
        .dashboard.festa-mamma { background: linear-gradient(135deg, #6a2a2a, #8a3a3a); color: #ffb6c1; }
        .dashboard.festa-gaudenzio { background: linear-gradient(135deg, #2a6a6a, #3a8a8a); color: #ffd700; }
        .dashboard.festa-repubblica { background: linear-gradient(135deg, #2a6a2a, #3a8a3a); color: #ffffff; }

        /* ============================================
           TOP BAR E FIRMA
           ============================================ */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 0;
            border-bottom: 3px solid #c00a1c;
            margin-bottom: 0.5rem;
        }

        .dashboard[class*="festa-"] .top-bar { 
            border-bottom-color: rgba(255,255,255,0.4); 
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .logo {
            height: 90px;
            width: auto;
            background: white; 
            border-radius: 15px;
            padding: 0.3rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .dashboard[class*="festa-"] .logo {
            background: white !important; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .logo img {
            height: 100%;
            width: auto;
            max-width: 280px;
            object-fit: contain;
        }

        .logo-fallback {
            font-size: 2.2rem;
            font-weight: 700;
            color: #0a2b44;
        }

        .dashboard[class*="festa-"] .logo-fallback {
            color: #0a2b44; 
        }

        .school-info {
            display: flex;
            flex-direction: column;
        }

        .school-name {
            font-size: 2.2rem;
            font-weight: 800;
            color: #0a2b44;
            line-height: 1.2;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .school-subtitle {
            font-size: 1.2rem;
            font-weight: 500;
            color: #c00a1c;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 0.2rem;
        }

        .dashboard[class*="festa-"] .school-name,
        .dashboard[class*="festa-"] .school-subtitle {
            color: inherit; 
        }

        /* Contenitore destra per Saluto + Firma */
        .top-right-area {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .saluto {
            font-size: 2rem;
            font-weight: 600;
            color: #c00a1c;
            background: #ffeeee;
            padding: 0.6rem 2rem;
            border-radius: 60px;
            white-space: nowrap;
            border: 2px solid transparent;
        }

        .firma {
            font-size: 1rem;
            font-weight: 700;
            color: #0a2b44;
            opacity: 0.5;
            margin-top: 0.4rem;
            margin-right: 1.2rem;
            letter-spacing: 1px;
        }

        .dashboard[class*="festa-"] .saluto { 
            background: rgba(255,255,255,0.2); 
            color: inherit;
            border-color: rgba(255,255,255,0.2);
        }

        .dashboard[class*="festa-"] .firma {
            color: inherit;
        }

        /* ============================================
           WRAPPER METEO + NOTIZIE
           ============================================ */
        .meteo-notizie-wrapper {
            display: flex;
            gap: 1rem;
            margin: 0.5rem 0 1rem 0;
            align-items: stretch;
        }

        /* ============================================
           AREA METEO
           ============================================ */
        .meteo-main {
            width: 50%;
            flex-shrink: 0;
            background: linear-gradient(135deg, #0a2b44 0%, #1a3f5c 100%);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 30px rgba(0,20,40,0.3);
            transition: all 0.5s ease;
        }

        .dashboard[class*="festa-"] .meteo-main { 
            background: rgba(255,255,255,0.15); 
            backdrop-filter: blur(5px); 
        }

        /* ============================================
           BOX NOTIZIE
           ============================================ */
        .notizie-box {
            flex: 1;
            background: linear-gradient(135deg, #0a2b44 0%, #1a3f5c 100%);
            color: white;
            border-radius: 30px;
            padding: 1.2rem 1.6rem;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 30px rgba(0,20,40,0.3);
            overflow: hidden;
        }

        .dashboard[class*="festa-"] .notizie-box {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(5px);
        }

        .notizie-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 0.6rem;
        }

        .notizie-icon { font-size: 1.4rem; }

        .notizie-title {
            font-size: 1.3rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            flex: 1;
        }

        .notizie-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            gap: 0.5rem;
        }

        .notizia-item {
            background: rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 0.9rem 1.2rem;
            border-left: 3px solid #c00a1c;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            transition: background 0.2s;
        }

        .notizia-titolo {
            font-size: 1.2rem;
            font-weight: 600;
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: inherit;
            text-decoration: none;
        }

        .notizia-data {
            font-size: 0.9rem;
            opacity: 0.6;
            font-weight: 400;
        }

        .notizia-loading {
            opacity: 0.5;
            font-size: 0.95rem;
            text-align: center;
            margin: auto;
        }

        /* Data e Meteo attuale: data a sinistra, meteo a destra */
        .meteo-row-1 {
            display: flex;
            justify-content: space-between; 
            gap: 0.5rem;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .data-ora-grande { 
            display: flex; 
            flex-direction: column; 
            margin-right: 0.5rem;
        }
        
        .ora-grande { font-size: 3.8rem; font-weight: 700; font-family: 'Courier New', monospace; letter-spacing: 2px; line-height: 1; }
        .data-grande { font-size: 1.6rem; font-weight: 400; opacity: 0.9; margin-top: 0.2rem;}

        .meteo-riassunto {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255,255,255,0.1);
            padding: 0.3rem 0.8rem;
            border-radius: 80px;
        }

        .icona-temp-grande { display: flex; align-items: center; gap: 0.5rem; }
        .icona-meteo-grande { font-size: 3rem; }
        .temp-grande { font-size: 3.5rem; font-weight: 700; }
        .desc-grande { font-size: 1.4rem; text-transform: capitalize; }

        .meteo-row-2 { display: flex; justify-content: space-between; gap: 0.5rem; margin-bottom: 0.5rem; }

        .meteo-dettaglio-card {
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            padding: 0.5rem 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex: 1;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .dettaglio-icona { font-size: 1.7rem; }
        .dettaglio-testo { display: flex; flex-direction: column; }
        .dettaglio-label { font-size: 0.85rem; text-transform: uppercase; opacity: 0.7; }
        .dettaglio-valore { font-size: 1.5rem; font-weight: 600; }

        /* Previsioni orarie */
        .previsioni-orarie { padding-top: 0.75rem; border-top: 1px solid rgba(255,255,255,0.2); }
        .previsioni-title { font-size: 1rem; font-weight: 600; margin-bottom: 0.4rem; opacity: 0.9; }
        .previsioni-container { display: flex; justify-content: space-between; gap: 0.6rem; }

        .previsione-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 0.4rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .previsione-ora { font-size: 1.3rem; font-weight: 600; }
        .previsione-icona { font-size: 1.3rem; margin: 0.2rem 0; }
        .previsione-temp { font-size: 1.1rem; font-weight: 700; }
        .previsione-pioggia { font-size: 1rem; opacity: 0.8; }

        /* ============================================
           QUADRANTI INFERIORI
           ============================================ */
        .bottom-quadrants {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
            flex: 1;
            min-height: 0;
        }

        /* Carosello - primo quadrante */
        .carousel-quadrant {
            width: 50%;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .carousel-quadrant .slide-container {
            display: flex;
            gap: 2rem;
            align-items: center;
            background: #f5f9ff;
            border-radius: 30px;
            padding: 1.5rem;
            border: 2px solid #d0e0f0;
            height: 100%;
            min-height: 250px;
            max-height: 300px;
            transition: background 0.5s ease, border-color 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .carousel-quadrant .slide-container.tipo-scuola {
            padding: 1.5rem;
            background: #0a2b44;
            border-color: #c00a1c;
            justify-content: flex-end;
            gap: 2rem;
        }

        .carousel-quadrant .slide-container.tipo-scuola .indirizzo-text-area {
            flex: 1;
            min-width: 0;
            color: white;
            text-align: right;
        }

        .carousel-quadrant .slide-container.tipo-scuola .indirizzo-nome,
        .carousel-quadrant .slide-container.tipo-scuola .indirizzo-desc {
            color: white;
        }

        .carousel-quadrant .indirizzo-image-area {
            width: 350px;
            height: auto;
            aspect-ratio: 16 / 9;
            align-self: center;
            background: transparent;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #c00a1c;
            overflow: hidden;
            flex-shrink: 0;
        }

        .carousel-quadrant .indirizzo-text-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .carousel-quadrant .indirizzo-nome {
            font-size: 2rem;
            line-height: 1.1;
            font-weight: 800;
            color: #0a2b44;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .carousel-quadrant .indirizzo-desc {
            font-size: 1rem;
            color: #2a4c73;
            border-top: 2px solid #c00a1c;
            padding-top: 0.6rem;
        }

        /* Countdown Maturità - secondo quadrante */
        .countdown-quadrant {
            width: 50%;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .countdown-card {
            background: linear-gradient(135deg, #0a2b44 0%, #1a3f5c 100%);
            color: white;
            border-radius: 30px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 30px rgba(0,20,40,0.3);
            height: 100%;
            min-height: 250px;
            max-height: 300px;
            overflow: hidden;
        }

        .dashboard[class*="festa-"] .countdown-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(5px);
        }

        .countdown-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 0.6rem;
        }

        .countdown-icon { font-size: 1.4rem; }

        .countdown-title {
            font-size: 1.3rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            flex: 1;
        }

        .countdown-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .countdown-number {
            font-size: 5rem;
            font-weight: 800;
            line-height: 1;
            background: rgba(255,255,255,0.08);
            border-radius: 30px;
            padding: 1rem 2rem;
            border-left: 5px solid #c00a1c;
            text-align: center;
            width: 100%;
        }

        .countdown-label {
            font-size: 1.3rem;
            font-weight: 500;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .countdown-date {
            font-size: 1.1rem;
            opacity: 0.7;
            margin-top: 0.5rem;
        }

        .dashboard[class*="festa-"] .countdown-number {
            background: rgba(255,255,255,0.9);
            color: #000;
        }

        /* ============================================
           QR CODE IN BASSO (invariato)
           ============================================ */
        .qr-footer-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            padding: 0.7rem 0 0.5rem 0;
            flex-shrink: 0;
        }

        .qr-code {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 1.2rem;
            background: white;
            padding: 0.9rem 2rem;
            border-radius: 80px;
            border: 4px solid #c00a1c;
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
            width: 375px;
        }

        .dashboard[class*="festa-"] .qr-code { 
            background: white !important; 
            border-color: #c00a1c; 
        }

        .qr-code img { 
            width: 80px; 
            height: 80px; 
            flex-shrink: 0;
        }

        .qr-code span { 
            font-size: 1.5rem; 
            font-weight: 700; 
            color: #0a2b44;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .dashboard[class*="festa-"] .qr-code span { 
            color: #0a2b44; 
        }

        /* ============================================
           ANIMAZIONE DE-ZOOM
           ============================================ */
        @keyframes panZoom {
            0% { transform: scale(1.12); opacity: 0; }
            5% { opacity: 1; }
            95% { opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }

        .indirizzo-image-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            animation: panZoom 8s ease-out forwards;
        }

        /* Punti di indicazione (Dots) */
        .dot-minimal { width: 30px; height: 6px; background: #c0d0e0; border-radius: 10px; display: inline-block; margin: 0 3px;}
        .dot-minimal.active { background: #c00a1c; width: 50px; }
        .progress-bar-container { margin-top: 0.5rem; }
        .progress-info { text-align: center; margin-top: 0.5rem; display: none; }

        /* Auguri Speciali */
        .auguri-speciali {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            padding: 0.4rem;
            background: rgba(255,255,255,0.15);
            border-radius: 50px;
            display: none;
            animation: bounce-glow 1.5s infinite;
        }

        @keyframes bounce-glow {
            0% { transform: scale(1) translateY(0); opacity: 1; }
            25% { transform: scale(1.08) translateY(-8px); opacity: 1; }
            50% { transform: scale(1.1) translateY(0); opacity: 1; box-shadow: 0 0 20px rgba(255, 215, 0, 0.6); }
            75% { transform: scale(1.05) translateY(-4px); opacity: 1; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
<div class="dashboard" id="dashboard">

    <div class="top-bar">
        <div class="logo-area">
            <div class="logo">
                <img src="images/logo.png" alt="Logo I.T.S. Rimini" onerror="this.onerror=null; this.parentElement.innerHTML='<span class=\'logo-fallback\'>🏫 I.T.S. RIMINI</span>';">
            </div>
            <div class="school-info">
                <div class="school-name">I.T.T.S. Rimini</div>
                <div class="school-subtitle">O. Belluzzi · L. Da Vinci</div>
            </div>
        </div>
        <div class="top-right-area">
            <div class="saluto" id="saluto">Buongiorno</div>
            <div class="firma">Nicola Bertuccioli 5H</div>
        </div>
    </div>

    <div class="auguri-speciali" id="auguriSpeciali"></div>

    <div class="meteo-notizie-wrapper">
        <div class="meteo-main">
            <div class="meteo-row-1">
                <div class="data-ora-grande">
                    <span class="ora-grande" id="ora">--:--</span>
                    <span class="data-grande" id="data">--- --- ----</span>
                </div>
                <div class="meteo-riassunto">
                    <div class="icona-temp-grande">
                        <span class="icona-meteo-grande" id="iconaMeteo">☀️</span>
                        <span class="temp-grande" id="temp">--°</span>
                    </div>
                    <span class="desc-grande" id="desc">caricamento...</span>
                </div>
            </div>
            
            <div class="meteo-row-2">
                <div class="meteo-dettaglio-card">
                    <span class="dettaglio-icona">🌡️</span>
                    <div class="dettaglio-testo">
                        <span class="dettaglio-label">Percepita</span>
                        <span class="dettaglio-valore" id="percepita">--°</span>
                    </div>
                </div>
                <div class="meteo-dettaglio-card">
                    <span class="dettaglio-icona">💧</span>
                    <div class="dettaglio-testo">
                        <span class="dettaglio-label">Umidità</span>
                        <span class="dettaglio-valore" id="umidita">--%</span>
                    </div>
                </div>
                <div class="meteo-dettaglio-card">
                    <span class="dettaglio-icona">☔</span>
                    <div class="dettaglio-testo">
                        <span class="dettaglio-label">Pioggia</span>
                        <span class="dettaglio-valore" id="pioggia">--%</span>
                    </div>
                </div>
            </div>
            
            <div class="previsioni-orarie" id="previsioniContainer">
                <div class="previsioni-title">⏱️ PROSSIME ORE</div>
                <div class="previsioni-container" id="previsioniList"></div>
            </div>
        </div>

        <div class="notizie-box">
            <div class="notizie-header">
                <span class="notizie-icon">📰</span>
                <span class="notizie-title">Ultime Notizie</span>
            </div>
            <div class="notizie-list" id="notizieList">
                <div class="notizia-loading">Caricamento notizie...</div>
            </div>
        </div>
    </div>

    <!-- QUADRANTI INFERIORI: CAROSELLO + COUNTDOWN MATURITÀ -->
    <div class="bottom-quadrants">
        <!-- Primo quadrante: Carosello -->
        <div class="carousel-quadrant">
            <div class="slide-container" id="slideContainerUnico"></div>
            <div class="progress-bar-container">
                <div class="progress-info">
                    <div class="dots-minimal" id="dotsMinimalUnico"></div>
                </div>
            </div>
        </div>

        <!-- Secondo quadrante: Countdown Maturità -->
        <div class="countdown-quadrant">
            <div class="countdown-card">
                <div class="countdown-header">
                    <span class="countdown-icon">🎓</span>
                    <span class="countdown-title">Maturità 2026</span>
                </div>
                <div class="countdown-content" id="countdownContent">
                    <div class="countdown-number" id="countdownNumber">--</div>
                    <div class="countdown-label">giorni</div>
                    <div class="countdown-date">18 Giugno 2026</div>
                </div>
            </div>
        </div>
    </div>

    <!-- QR CODE IN BASSO (invariato) -->
    <div class="qr-footer-bar">
        <div class="qr-code">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=https://www.ittsrimini.edu.it/" alt="QR sito web">
            <span>📱 Sito della scuola</span>
        </div>
        <div class="qr-code qr-instagram">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=https://www.instagram.com/itts.belluzzidavincirimini?utm_source=qr&igsh=MWRrZ2ZlY3RlcXdwZA==" alt="QR Instagram">
            <span>📸 Instagram</span>
        </div>
    </div>
</div>

<script>
    (function() {
        const API_KEY = '34743dedccb2cccfe2b3986b35bf78d4'; 
        
        const indirizzi = [
            { nome: 'CHIMICA, MATERIALI E BIOTECNOLOGIE', desc: 'Analisi chimiche · Biotecnologie · Materiali innovativi · Controllo qualità e gestione impianti', img: 'images/chimica.jpg' },
            { nome: 'COSTRUZIONI, AMBIENTE E TERRITORIO (CAT)', desc: 'Progettazione edilizia · Topografia · Estimo · Edilizia ecocompatibile e sicurezza cantieri', img: 'images/cat.jpg' },
            { nome: 'ELETTRONICA ED ELETTROTECNICA', desc: 'Circuiti elettronici · Impianti elettrici · Automazione industriale e robotica', img: 'images/elettronica.jpg' },
            { nome: 'GRAFICA E COMUNICAZIONE', desc: 'Comunicazione visiva · Editoria · Fotografia · Web design e social media', img: 'images/grafica.jpg' },
            { nome: 'INFORMATICA E TELECOMUNICAZIONI', desc: 'Sviluppo software · Reti e cybersecurity · Basi di dati e applicazioni web', img: 'images/informatica.jpg' },
            { nome: 'MECCANICA, MECCATRONICA ED ENERGIA', desc: 'Progettazione CAD · Automazione e robotica · Impianti industriali ed energetici', img: 'images/meccanica.jpg' }
        ];

        const fotoscuola = [
            { img: 'images/img1.jpg', titolo: 'La nostra scuola', desc: 'La cupola del Belluzzi' },
            { img: 'images/img2.jpg', titolo: 'La nostra scuola', desc: 'La sede Da Vinci' },
            { img: 'images/img3.jpg', titolo: 'I laboratori', desc: 'Oltre 30 spazi attrezzati per la pratica e l\'innovazione.' },
            { img: 'images/img4.jpg', titolo: 'Campo esterno', desc: 'Il nostro campetto all\'aperto' }
        ];

        const TEMPO_SLIDE = 8000;

        // ============================================
        // SISTEMA FESTIVITÀ
        // ============================================
        function calcolaPasqua(anno) {
            const a = anno % 19; const b = Math.floor(anno / 100); const c = anno % 100; const d = Math.floor(b / 4);
            const e = b % 4; const f = Math.floor((b + 8) / 25); const g = Math.floor((b - f + 1) / 3);
            const h = (19 * a + b - d - g + 15) % 30; const i = Math.floor(c / 4); const k = c % 4;
            const l = (32 + 2 * e + 2 * i - h - k) % 7; const m = Math.floor((a + 11 * h + 22 * l) / 451);
            const mese = Math.floor((h + l - 7 * m + 114) / 31); const giorno = ((h + l - 7 * m + 114) % 31) + 1;
            return new Date(anno, mese - 1, giorno);
        }

        function isPeriodoPasqua(data) {
            const anno = data.getFullYear(); const pasqua = calcolaPasqua(anno);
            const inizioPeriodo = new Date(pasqua); inizioPeriodo.setDate(pasqua.getDate() - 3);
            const finePeriodo = new Date(pasqua); finePeriodo.setDate(pasqua.getDate() + 3);
            return data >= inizioPeriodo && data <= finePeriodo;
        }

        function getFestaCorrente() {
            const oggi = new Date(); const mese = oggi.getMonth() + 1; const giorno = oggi.getDate(); const anno = oggi.getFullYear();
            
            if (mese === 2 && giorno >= 1 && giorno <= 21) return { nome: 'san-valentino', auguri: '❤️ Buon San Valentino! ❤️', classe: 'festa-san-valentino' };
            if (mese === 10 && giorno >= 20 && giorno <= 31) return { nome: 'halloween', auguri: '🎃 Dolcetto o scherzetto? Buon Halloween! 🎃', classe: 'festa-halloween' };
            if (mese === 3 && giorno >= 5 && giorno <= 8) return { nome: 'donna', auguri: '🌸 Festa della Donna · 8 Marzo 🌸', classe: 'festa-donna' };
            if (mese === 10 && giorno >= 12 && giorno <= 14) return { nome: 'gaudenzio', auguri: '🎉 Buon San Gaudenzio, patrono di Rimini! 🎉', classe: 'festa-gaudenzio' };
            if (mese === 5 && giorno >= 30 || (mese === 6 && giorno <= 2)) return { nome: 'repubblica', auguri: '🇮🇹 Festa della Repubblica Italiana! 🇮🇹', classe: 'festa-repubblica' };
            if ((mese === 12 && giorno >= 15) || (mese === 1 && giorno <= 10)) return { nome: 'natale', auguri: '🎄 Buon Natale e Felice Anno Nuovo! 🎄', classe: 'festa-natale' };
            if (mese === 1 && giorno === 27) return { nome: 'memoria', auguri: '🕯️ Giornata della Memoria · Per non dimenticare 🕯️', classe: 'festa-memoria' };
            if (mese === 3 && giorno === 19) return { nome: 'papa', auguri: '👔 Buona Festa del Papà! 👔', classe: 'festa-papa' };
            if (mese === 10 && giorno === 2) return { nome: 'nonni', auguri: '👴👵 Buona Festa dei Nonni! 👴👵', classe: 'festa-nonni' };
            if (mese === 5) {
                const primaDomenica = new Date(anno, 4, 1);
                while (primaDomenica.getDay() !== 0) primaDomenica.setDate(primaDomenica.getDate() + 1);
                const secondaDomenica = new Date(primaDomenica); secondaDomenica.setDate(primaDomenica.getDate() + 7);
                if (oggi.toDateString() === secondaDomenica.toDateString()) return { nome: 'mamma', auguri: '🌷 Buona Festa della Mamma! 🌷', classe: 'festa-mamma' };
            }
            if (isPeriodoPasqua(oggi)) return { nome: 'pasqua', auguri: '🐣 Buona Pasqua! 🐣', classe: 'festa-pasqua' };
            return null;
        }

        function applicaTemaFestivo() {
            const festa = getFestaCorrente();
            const body = document.body;
            const dashboard = document.getElementById('dashboard');
            const auguriElement = document.getElementById('auguriSpeciali');
            
            body.className = '';
            dashboard.className = 'dashboard';
            
            const classiFesta = ['festa-natale', 'festa-halloween', 'festa-pasqua', 'festa-san-valentino', 'festa-memoria', 'festa-donna', 'festa-papa', 'festa-nonni', 'festa-mamma', 'festa-gaudenzio', 'festa-repubblica'];
            classiFesta.forEach(classe => { body.classList.remove(classe); dashboard.classList.remove(classe); });
            
            if (festa) {
                body.classList.add(festa.classe); dashboard.classList.add(festa.classe);
                auguriElement.textContent = festa.auguri; auguriElement.style.display = 'block';
            } else {
                auguriElement.style.display = 'none';
            }
        }

        function aggiornaSaluto() {
            const salutoEl = document.getElementById('saluto');
            const ora = new Date().getHours();
            if (ora >= 5 && ora < 13) salutoEl.textContent = 'Buongiorno 🌅';
            else if (ora >= 13 && ora < 18) salutoEl.textContent = 'Buon pomeriggio ☀️';
            else salutoEl.textContent = 'Buonasera 🌙';
        }

        function aggiornaOraData() {
            const now = new Date();
            const ore = String(now.getHours()).padStart(2, '0');
            const minuti = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('ora').textContent = `${ore}:${minuti}`;
            
            const giorni = ['Domenica', 'Lunedì', 'Martedì', 'Mercoledì', 'Giovedì', 'Venerdì', 'Sabato'];
            const mesi = ['Gennaio', 'Febbraio', 'Marzo', 'Aprile', 'Maggio', 'Giugno', 'Luglio', 'Agosto', 'Settembre', 'Ottobre', 'Novembre', 'Dicembre'];
            document.getElementById('data').textContent = `${giorni[now.getDay()]} ${now.getDate()} ${mesi[now.getMonth()]} ${now.getFullYear()}`;
        }

        function getIconaMeteo(condizione) {
            const desc = condizione.toLowerCase();
            if (desc.includes('sereno') || desc.includes('clear')) return '☀️';
            if (desc.includes('poco nuvoloso') || desc.includes('few clouds')) return '🌤️';
            if (desc.includes('nuvoloso') || desc.includes('clouds')) return '☁️';
            if (desc.includes('pioggia') || desc.includes('rain')) return '🌧️';
            if (desc.includes('temporale') || desc.includes('thunderstorm')) return '⛈️';
            if (desc.includes('nebbia') || desc.includes('fog')) return '🌫️';
            if (desc.includes('neve') || desc.includes('snow')) return '❄️';
            return '⛅';
        }

        function aggiornaPrevisioni(forecastData) {
            const previsioniList = document.getElementById('previsioniList');
            if (!previsioniList || !forecastData || !forecastData.list) return;
            
            const now = new Date();
            const oraCorrente = now.getHours();
            
            let html = '';
            for (let i = 1; i <= 3; i++) {
                const targetHour = (oraCorrente + (i * 2)) % 24; 
                let closestIndex = 0; let minDiff = Infinity;
                
                for (let j = 0; j < forecastData.list.length; j++) {
                    const forecastDate = new Date(forecastData.list[j].dt * 1000);
                    const forecastHour = forecastDate.getHours();
                    const diff = Math.abs(forecastHour - targetHour);
                    if (diff < minDiff) { minDiff = diff; closestIndex = j; }
                }
                
                const previsione = forecastData.list[closestIndex];
                const temp = Math.round(previsione.main.temp);
                const pioggia = previsione.pop ? Math.round(previsione.pop * 100) : 0;
                const desc = previsione.weather[0].description;
                const icona = getIconaMeteo(desc);
                const oraStr = String(targetHour).padStart(2, '0') + ':00';
                
                html += `<div class="previsione-card"><div class="previsione-ora">${oraStr}</div><div class="previsione-icona">${icona}</div><div class="previsione-temp">${temp}°</div><div class="previsione-pioggia">💧 ${pioggia}%</div></div>`;
            }
            previsioniList.innerHTML = html;
        }

        async function caricaMeteoReale() {
            const citta = 'Rimini';
            const forecastUrl = `https://api.openweathermap.org/data/2.5/forecast?q=${citta}&units=metric&lang=it&appid=${API_KEY}`;
            
            try {
                const weatherResponse = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${citta}&units=metric&lang=it&appid=${API_KEY}`);
                if (!weatherResponse.ok) throw new Error(`Errore API: ${weatherResponse.status}`);
                
                const data = await weatherResponse.json();
                const forecastResponse = await fetch(forecastUrl);
                let rainProbability = 0;
                
                if (forecastResponse.ok) {
                    const forecastData = await forecastResponse.json();
                    if (forecastData.list && forecastData.list[0] && forecastData.list[0].pop !== undefined) {
                        rainProbability = Math.round(forecastData.list[0].pop * 100);
                    }
                    aggiornaPrevisioni(forecastData);
                }
                
                document.getElementById('temp').innerHTML = Math.round(data.main.temp) + '°';
                document.getElementById('desc').innerHTML = data.weather[0].description;
                document.getElementById('iconaMeteo').innerHTML = getIconaMeteo(data.weather[0].description);
                document.getElementById('percepita').innerHTML = Math.round(data.main.feels_like) + '°';
                document.getElementById('umidita').innerHTML = data.main.humidity + '%';
                document.getElementById('pioggia').innerHTML = rainProbability + '%';
                
            } catch (error) {
                console.error('Errore nel caricamento del meteo:', error);
            }
        }

        function costruisciSequenza() {
            const seq = [];
            const maxLen = Math.max(indirizzi.length, fotoscuola.length);
            for (let i = 0; i < maxLen; i++) {
                if (i < indirizzi.length) seq.push({ tipo: 'indirizzo', dati: indirizzi[i] });
                if (i < fotoscuola.length) seq.push({ tipo: 'scuola', dati: fotoscuola[i] });
            }
            return seq;
        }

        let sequenza = [];
        let currentSlide = 0;

        function aggiornaSlideUnico(index) {
            const container = document.getElementById('slideContainerUnico');
            const item = sequenza[index];

            if (item.tipo === 'indirizzo') {
                const s = item.dati;
                container.className = 'slide-container tipo-indirizzo';
                container.innerHTML = `
                    <div class="indirizzo-image-area">
                        <img src="${s.img}" alt="${s.nome}" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'image-placeholder\'>📷</div>';">
                    </div>
                    <div class="indirizzo-text-area">
                        <div class="indirizzo-nome">${s.nome}</div>
                        <div class="indirizzo-desc">${s.desc}</div>
                    </div>
                `;
            } else {
                const s = item.dati;
                container.className = 'slide-container tipo-scuola';
                container.innerHTML = `
                    <div class="indirizzo-text-area">
                        <div class="indirizzo-nome">${s.titolo || 'La nostra scuola'}</div>
                        <div class="indirizzo-desc">${s.desc || ''}</div>
                    </div>
                    <div class="indirizzo-image-area">
                        <img src="${s.img}" alt="${s.titolo || 'Foto scuola'}" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'image-placeholder\'>📷</div>';">
                    </div>
                `;
            }

            document.querySelectorAll('#dotsMinimalUnico .dot-minimal').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
        }

        function slideSuccessiva() {
            currentSlide = (currentSlide + 1) % sequenza.length;
            aggiornaSlideUnico(currentSlide);
        }

        function creaPalliniMinimal() {
            const container = document.getElementById('dotsMinimalUnico');
            container.innerHTML = '';
            sequenza.forEach((_, idx) => {
                const dot = document.createElement('span');
                dot.className = 'dot-minimal' + (idx === 0 ? ' active' : '');
                container.appendChild(dot);
            });
        }

        async function caricaNotizie() {
            const rssUrl = 'https://www.ittsrimini.edu.it/tipologia-articolo/notizie/feed/';
            const container = document.getElementById('notizieList');

            const proxies = [
                `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&count=3`,
                `https://allorigins.win/get?disableCache=true&url=${encodeURIComponent(rssUrl)}`,
                `https://corsproxy.io/?${encodeURIComponent(rssUrl)}`
            ];

            for (let i = 0; i < proxies.length; i++) {
                try {
                    const res = await fetch(proxies[i]);
                    if (!res.ok) continue;

                    let items = [];

                    if (i === 0) {
                        const data = await res.json();
                        if (!data.items || data.items.length === 0) continue;
                        items = data.items.map(item => ({
                            titolo: item.title,
                            data: new Date(item.pubDate)
                        }));
                    } else {
                        let xmlText = '';
                        if (i === 1) {
                            const json = await res.json();
                            xmlText = json.contents;
                        } else {
                            xmlText = await res.text();
                        }
                        const parser = new DOMParser();
                        const xml = parser.parseFromString(xmlText, 'text/xml');
                        const entries = xml.querySelectorAll('item');
                        if (!entries.length) continue;
                        entries.forEach((entry) => {
                            const titolo = entry.querySelector('title')?.textContent || '';
                            const dataTxt = entry.querySelector('pubDate')?.textContent || '';
                            items.push({ titolo, data: new Date(dataTxt) });
                        });
                    }

                    items.sort((a, b) => (b.data?.getTime?.() || 0) - (a.data?.getTime?.() || 0));
                    items = items.slice(0, 3);

                    if (!items.length) continue;

                    const mesi = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
                    container.innerHTML = items.map(item => {
                        const d = item.data;
                        const dataStr = isNaN(d) ? '' : `${d.getDate()} ${mesi[d.getMonth()]} ${d.getFullYear()}`;
                        const titolo = item.titolo
                            .replace(/&amp;/g,'&').replace(/&#8211;/g,'–')
                            .replace(/&#8217;/g,"'").replace(/&#8220;/g,'"').replace(/&#8221;/g,'"');
                        return `<div class="notizia-item">
                            <div class="notizia-titolo">${titolo}</div>
                            ${dataStr ? `<div class="notizia-data">📅 ${dataStr}</div>` : ''}
                        </div>`;
                    }).join('');
                    return;

                } catch(e) { continue; }
            }

            container.innerHTML = [
                { titolo: 'Iniziativa Referendum', data: '05 Mar 2026' },
                { titolo: 'Il "Belluzzi-da Vinci" vince la prima sfida de "La Campanella" 2026', data: '18 Feb 2026' },
                { titolo: 'SADOC INFORMA N. 4 – 2026', data: '26 Feb 2026' }
            ].map(n => `<div class="notizia-item">
                <div class="notizia-titolo">${n.titolo}</div>
                <div class="notizia-data">📅 ${n.data}</div>
            </div>`).join('');
        }

        // ============================================
        // COUNTDOWN MATURITÀ
        // ============================================
        function aggiornaCountdown() {
            const oggi = new Date();
            const maturita = new Date(2026, 5, 18); // 18 Giugno 2026 (mese 5 = Giugno)
            
            // Calcola la differenza in millisecondi
            const diff = maturita - oggi;
            
            // Converti in giorni
            const giorniMancanti = Math.ceil(diff / (1000 * 60 * 60 * 24));
            
            const countdownElement = document.getElementById('countdownNumber');
            if (countdownElement) {
                countdownElement.textContent = giorniMancanti > 0 ? giorniMancanti : 0;
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            aggiornaSaluto();
            aggiornaOraData();
            
            applicaTemaFestivo();
            caricaMeteoReale();
            caricaNotizie();
            aggiornaCountdown();
            
            sequenza = costruisciSequenza();
            creaPalliniMinimal();
            aggiornaSlideUnico(0);
            
            setInterval(slideSuccessiva, TEMPO_SLIDE);
            setInterval(aggiornaOraData, 1000);
            setInterval(caricaMeteoReale, 900000);
            setInterval(caricaNotizie, 600000);
            setInterval(aggiornaCountdown, 3600000); // Aggiorna countdown ogni ora
            setInterval(aggiornaSaluto, 60000);
            setInterval(applicaTemaFestivo, 3600000);
        });
    })();
</script>
