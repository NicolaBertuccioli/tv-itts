        function calcolaPasqua(anno) {
            const a = anno % 19;
            const b = Math.floor(anno / 100);
            const c = anno % 100;
            const d = Math.floor(b / 4);
            const e = b % 4;
            const f = Math.floor((b + 8) / 25);
            const g = Math.floor((b - f + 1) / 3);
            const h = (19 * a + b - d - g + 15) % 30;
            const i = Math.floor(c / 4);
            const k = c % 4;
            const l = (32 + 2 * e + 2 * i - h - k) % 7;
            const m = Math.floor((a + 11 * h + 22 * l) / 451);
            const mese = Math.floor((h + l - 7 * m + 114) / 31);
            const giorno = ((h + l - 7 * m + 114) % 31) + 1;
            
            return new Date(anno, mese - 1, giorno);
        }

        function isPeriodoPasqua(data) {
            const anno = data.getFullYear();
            const pasqua = calcolaPasqua(anno);
            
            const inizioPeriodo = new Date(pasqua);
            inizioPeriodo.setDate(pasqua.getDate() - 3);
            
            const finePeriodo = new Date(pasqua);
            finePeriodo.setDate(pasqua.getDate() + 3);
            
            return data >= inizioPeriodo && data <= finePeriodo;
        }

            nome: 'halloween',
            auguri: '🎃 Dolcetto o scherzetto? Buon Halloween! 🎃',
            classe: 'festa-halloween'
        };
    }
    
    // ============================================
    // FESTE CON SETTIMANA PRIMA + GIORNO STESSO
    // ============================================
    
    // FESTA DELLA DONNA (1 MARZO - 8 MARZO)
    if (mese === 3 && giorno >= 1 && giorno <= 8) {
        return {
            nome: 'donna',
            auguri: '🌸 Festa della Donna · 8 Marzo 🌸',
            classe: 'festa-donna'
        };
    }
    
    // SAN GAUDENZIO - PATRONO DI RIMINI (7 OTTOBRE - 14 OTTOBRE)
    if (mese === 10 && giorno >= 7 && giorno <= 14) {
        return {
            nome: 'gaudenzio',
            auguri: '🎉 Buon San Gaudenzio, patrono di Rimini! 🎉',
            classe: 'festa-gaudenzio'
        };
    }
    
    // ============================================
    // FESTE A DATA SINGOLA (invariate)
    // ============================================
    
    // Festa della Repubblica (2 giugno, giorni prima)
    if (mese === 5 && giorno >= 28 || (mese === 6 && giorno <= 2)) {
        return {
            nome: 'repubblica',
            auguri: '🇮🇹 Festa della Repubblica Italiana! 🇮🇹',
            classe: 'festa-repubblica'
        };
    }
    
    // Feste natalizie (15 dicembre - 10 gennaio)
    if ((mese === 12 && giorno >= 15) || (mese === 1 && giorno <= 10)) {
        return {
            nome: 'natale',
            auguri: '🎄 Buon Natale e Felice Anno Nuovo! 🎄',
            classe: 'festa-natale'
        };
    }
    
    // Giornata della Memoria (27 gennaio)
    if (mese === 1 && giorno === 27) {
        return {
            nome: 'memoria',
            auguri: '🕯️ Giornata della Memoria · Per non dimenticare 🕯️',
            classe: 'festa-memoria'
        };
    }
    
    // Festa del Papà (19 marzo)
    if (mese === 3 && giorno === 19) {
        return {
            nome: 'papa',
            auguri: '👔 Buona Festa del Papà! 👔',
            classe: 'festa-papa'
        };
    }
    
    // Festa dei Nonni (2 ottobre)
    if (mese === 10 && giorno === 2) {
        return {
            nome: 'nonni',
            auguri: '👴👵 Buona Festa dei Nonni! 👴👵',
            classe: 'festa-nonni'
        };
    }
    
    // Festa della Mamma (seconda domenica di maggio)
    if (mese === 5) {
        const primaDomenica = new Date(anno, 4, 1);
        while (primaDomenica.getDay() !== 0) {
            primaDomenica.setDate(primaDomenica.getDate() + 1);
        }
        const secondaDomenica = new Date(primaDomenica);
        secondaDomenica.setDate(primaDomenica.getDate() + 7);
        
        if (oggi.toDateString() === secondaDomenica.toDateString()) {
            return {
                nome: 'mamma',
                auguri: '🌷 Buona Festa della Mamma! 🌷',
                classe: 'festa-mamma'
            };
        }
    }
    
    // Pasqua (periodo di ±3 giorni)
    if (isPeriodoPasqua(oggi)) {
        return {
            nome: 'pasqua',
            auguri: '🐣 Buona Pasqua! 🐣',
            classe: 'festa-pasqua'
        };
    }
    
    return null;
}

        function applicaTemaFestivo() {
            const festa = getFestaCorrente();
            const body = document.body;
            const dashboard = document.getElementById('dashboard');
            const auguriElement = document.getElementById('auguriSpeciali');
            
            body.className = '';
            dashboard.className = 'dashboard';
            
            const classiFesta = [
                'festa-natale', 'festa-halloween', 'festa-pasqua', 
                'festa-san-valentino', 'festa-memoria', 'festa-donna',
                'festa-papa', 'festa-nonni', 'festa-mamma',
                'festa-gaudenzio', 'festa-repubblica'
            ];
            
            classiFesta.forEach(classe => {
                body.classList.remove(classe);
                dashboard.classList.remove(classe);
            });
            
            if (festa) {
                body.classList.add(festa.classe);
                dashboard.classList.add(festa.classe);
                auguriElement.textContent = festa.auguri;
                auguriElement.style.display = 'block';
            } else {
                auguriElement.style.display = 'none';
            }
        }

        // SALUTO BASATO SULL'ORA
        function aggiornaSaluto() {
            const salutoEl = document.getElementById('saluto');
            const ora = new Date().getHours();
            
            if (ora >= 5 && ora < 13) salutoEl.textContent = 'Buongiorno 🌅';
            else if (ora >= 13 && ora < 18) salutoEl.textContent = 'Buon pomeriggio ☀️';
            else salutoEl.textContent = 'Buonasera 🌙';
        }

        // DATA E ORA
        function aggiornaOraData() {
            const now = new Date();
            const ore = String(now.getHours()).padStart(2, '0');
            const minuti = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('ora').textContent = `${ore}:${minuti}`;
            
            const giorni = ['Domenica', 'Lunedì', 'Martedì', 'Mercoledì', 'Giovedì', 'Venerdì', 'Sabato'];
            const mesi = ['Gennaio', 'Febbraio', 'Marzo', 'Aprile', 'Maggio', 'Giugno', 'Luglio', 'Agosto', 'Settembre', 'Ottobre', 'Novembre', 'Dicembre'];
            
            document.getElementById('data').textContent = 
                `${giorni[now.getDay()]} ${now.getDate()} ${mesi[now.getMonth()]} ${now.getFullYear()}`;
        }

        // FUNZIONE PER ICONA METEO
        function getIconaMeteo(condizione) {
            const desc = condizione.toLowerCase();
            if (desc.includes('sereno') || desc.includes('clear')) return '☀️';
            if (desc.includes('poco nuvoloso') || desc.includes('few clouds')) return '🌤️';
            if (desc.includes('nuvoloso') || desc.includes('clouds')) return '☁️';
            if (desc.includes('pioggia') || desc.includes('rain')) return '🌧️';
            if (desc.includes('temporale') || desc.includes('thunderstorm')) return '⛈️';
            if (desc.includes('nebbia') || desc.includes('fog')) return '🌫️';
            if (desc.includes('neve') || desc.includes('snow')) return '❄️';
            return '⛅';
        }

        // FUNZIONE PER AGGIORNARE LE PREVISIONI ORARIE
        function aggiornaPrevisioni(forecastData) {
            const previsioniList = document.getElementById('previsioniList');
            if (!previsioniList || !forecastData || !forecastData.list) return;
            
            const now = new Date();
            const oraCorrente = now.getHours();
            
            let html = '';
            for (let i = 1; i <= 5; i++) {
                const targetHour = (oraCorrente + i) % 24;
                
                // Trova la previsione con ora più vicina a targetHour
                let closestIndex = 0;
                let minDiff = Infinity;
                for (let j = 0; j < forecastData.list.length; j++) {
                    const forecastDate = new Date(forecastData.list[j].dt * 1000);
                    const forecastHour = forecastDate.getHours();
                    const diff = Math.abs(forecastHour - targetHour);
                    if (diff < minDiff) {
                        minDiff = diff;
                        closestIndex = j;
                    }
                }
                
                const previsione = forecastData.list[closestIndex];
                const temp = Math.round(previsione.main.temp);
                const pioggia = previsione.pop ? Math.round(previsione.pop * 100) : 0;
                const desc = previsione.weather[0].description;
                const icona = getIconaMeteo(desc);
                const oraStr = String(targetHour).padStart(2, '0') + ':00';
                
                html += `
                    <div class="previsione-card">
                        <div class="previsione-ora">${oraStr}</div>
                        <div class="previsione-icona">${icona}</div>
                        <div class="previsione-temp">${temp}°</div>
                        <div class="previsione-pioggia">💧 ${pioggia}%</div>
                    </div>
                `;
            }
            
            previsioniList.innerHTML = html;
        }

        // METEO REALE DA OPENWEATHERMAP
        async function caricaMeteoReale() {
            const citta = 'Rimini';
            
            const forecastUrl = `https://api.openweathermap.org/data/2.5/forecast?q=${citta}&units=metric&lang=it&appid=${API_KEY}`;
            
            try {
                const weatherResponse = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${citta}&units=metric&lang=it&appid=${API_KEY}`);
                
                if (!weatherResponse.ok) {
                    throw new Error(`Errore API: ${weatherResponse.status}`);
                }
                
                const data = await weatherResponse.json();
                
                const forecastResponse = await fetch(forecastUrl);
                let rainProbability = 0;
                let forecastData = null;
                
                if (forecastResponse.ok) {
                    forecastData = await forecastResponse.json();
                    if (forecastData.list && forecastData.list[0] && forecastData.list[0].pop !== undefined) {
                        rainProbability = Math.round(forecastData.list[0].pop * 100);
                    }
                    // Aggiorna le previsioni orarie
                    aggiornaPrevisioni(forecastData);
                }
                
                const temp = Math.round(data.main.temp);
                const feelsLike = Math.round(data.main.feels_like);
                const humidity = data.main.humidity;
                const description = data.weather[0].description;
                
                document.getElementById('temp').innerHTML = temp + '°';
                document.getElementById('desc').innerHTML = description;
                document.getElementById('iconaMeteo').innerHTML = getIconaMeteo(description);
                document.getElementById('percepita').innerHTML = feelsLike + '°';
                document.getElementById('umidita').innerHTML = humidity + '%';
                document.getElementById('pioggia').innerHTML = rainProbability + '%';
                
            } catch (error) {
                console.error('Errore nel caricamento del meteo:', error);
                
                document.getElementById('temp').innerHTML = '--°';
                document.getElementById('desc').innerHTML = 'Errore caricamento';
                document.getElementById('iconaMeteo').innerHTML = '❓';
                document.getElementById('percepita').innerHTML = '--°';
                document.getElementById('umidita').innerHTML = '--%';
                document.getElementById('pioggia').innerHTML = '--%';
            }
        }

        // CAROSELLO
        function aggiornaSlide(index) {
            const container = document.getElementById('slideContainer');
            const s = indirizzi[index];
            
            container.innerHTML = `
                <div class="indirizzo-image-area">
                    <img src="${s.img}" alt="${s.nome}" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'image-placeholder\'>📷</div>';">
                </div>
                <div class="indirizzo-text-area">
                    <div class="indirizzo-nome">${s.nome}</div>
                    <div class="indirizzo-desc">${s.desc}</div>
                </div>
            `;

            document.querySelectorAll('#dotsMinimal .dot-minimal').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
            
            resetProgressBar();
        }

        function aggiornaSlideScuola(index) {
            const container = document.getElementById('slideContainerScuola');
            const s = fotoscuola[index];
            
            container.innerHTML = `
                <div class="indirizzo-image-area">
                    <img src="${s.img}" alt="${s.nome}" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'image-placeholder\'>📷</div>';">
                </div>
                <div class="indirizzo-text-area">
                    <div class="indirizzo-nome">${s.nome}</div>
                    <div class="indirizzo-desc">${s.desc}</div>
                </div>
            `;

            document.querySelectorAll('#dotsMinimalScuola .dot-minimal').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
            
            resetProgressBarScuola();
        }

        function resetProgressBar() {
            if (progressInterval) clearInterval(progressInterval);
            
            const progressFill = document.getElementById('progressFill');
            progressFill.style.width = '0%';
            
            const startTime = Date.now();
            progressInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const percent = (elapsed / TEMPO_SLIDE) * 100;
                
                if (percent <= 100) {
                    progressFill.style.width = percent + '%';
                } else {
                    clearInterval(progressInterval);
                }
            }, 50);
        }

        function resetProgressBarScuola() {
            if (progressIntervalScuola) clearInterval(progressIntervalScuola);
            
            const progressFill = document.getElementById('progressFillScuola');
            progressFill.style.width = '0%';
            
            const startTime = Date.now();
            progressIntervalScuola = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const percent = (elapsed / TEMPO_SLIDE) * 100;
                
                if (percent <= 100) {
                    progressFill.style.width = percent + '%';
                } else {
                    clearInterval(progressIntervalScuola);
                }
            }, 50);
        }

        function slideSuccessiva() {
            currentSlide = (currentSlide + 1) % indirizzi.length;
            aggiornaSlide(currentSlide);
        }

        function slideSuccessivaScuola() {
            currentSlideScuola = (currentSlideScuola + 1) % fotoscuola.length;
            aggiornaSlideScuola(currentSlideScuola);
        }

        function creaPalliniMinimal() {
            const container = document.getElementById('dotsMinimal');
            container.innerHTML = '';
            indirizzi.forEach((_, idx) => {
                const dot = document.createElement('span');
                dot.className = 'dot-minimal' + (idx === 0 ? ' active' : '');
                container.appendChild(dot);
            });

            const containerScuola = document.getElementById('dotsMinimalScuola');
            containerScuola.innerHTML = '';
            fotoscuola.forEach((_, idx) => {
                const dot = document.createElement('span');
                dot.className = 'dot-minimal' + (idx === 0 ? ' active' : '');
                containerScuola.appendChild(dot);
            });
        }

        // AVVIO
        window.addEventListener('DOMContentLoaded', () => {
            aggiornaSaluto();
            aggiornaOraData();
            
            applicaTemaFestivo();
            caricaMeteoReale();
            
            creaPalliniMinimal();
            aggiornaSlide(0);
            aggiornaSlideScuola(0);
            
            setInterval(slideSuccessiva, TEMPO_SLIDE);
            setInterval(slideSuccessivaScuola, TEMPO_SLIDE);
            setInterval(aggiornaOraData, 1000);
            setInterval(caricaMeteoReale, 900000);
            setInterval(aggiornaSaluto, 60000);
            setInterval(applicaTemaFestivo, 3600000);
        });
    })();
</script>
